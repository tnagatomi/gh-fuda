name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
          go_build_options: -ldflags=-X=github.com/tnagatomi/gh-fuda/cmd.version=${{ github.ref_name }}
